experience:
  description: >
    Human-readable description of the overall experience. This field is for
    maintainers and documentation and is not included in prompt assembly.

  prompt_preamble: >
    Common opening text added at the start of every prompt.

  role: >
    Common role definition added after the common preamble.

  global_rules: >
    Common behavioural rules added after the role text.

  shared_output_rules: >
    Common output rules added after the global rules.

  evaluation: >
    Additional text appended only when building an evaluation prompt.

  coaching: >
    Additional text appended only when building a coaching prompt.

stage:
  description: >
    Human-readable description of this stage. This field is for maintainers and
    documentation and is not included in prompt assembly.

  prompt_preamble: >
    Stage-wide opening text added to every prompt in this stage.

  purpose: >
    Stage-wide purpose text added after the stage preamble.

  rules: >
    Stage-wide behavioural rules added after the stage purpose.

  shared_output_rules: >
    Stage-wide output rules added after the stage rules.

  evaluation: >
    Additional text appended only when building an evaluation prompt for this stage.

  coaching: >
    Additional text appended only when building a coaching prompt for this stage.

states:
  state_name:
    description: >
      Human-readable description of this state. This field is for maintainers and
      documentation and is not included in prompt assembly.

    prompt_preamble: >
      State-specific opening text added to every prompt in this state.

    purpose: >
      State-specific purpose text added after the state preamble.

    rules: >
      State-specific behavioural rules added after the state purpose.

    shared_output_rules: >
      State-specific output rules added after the state rules.

    evaluation: >
      Additional text appended only when building an evaluation prompt for this state.

    coaching: >
      Additional text appended only when building a coaching prompt for this state.
