# V3 stage YAML template
# -------------------------------------------------------------------
# Purpose
#   Externalize prompt content, criteria, and stage/state-specific context
#   for the LLM layer.
#
# Important rule
#   This file is NOT the canonical owner of FSM logic or transitions.
#   Macro-stage routing belongs to controller.py.
#   Local FSM ownership belongs to each stage module.
#   This YAML only provides prompt/config material that stage modules and
#   engine.py may consume when constructing prompts.
# -------------------------------------------------------------------

version: "v3"

meta:
  description: "Template for stage-level YAML prompt/config in Coach V3"
  source_of_truth_note: "Code is source of truth for exact model names, routes, and transition logic. YAML supports prompt construction only."

shared:
  llm_defaults:
    temperature: 0.2
    max_output_tokens: 500
    timeout_seconds: 20

  prompt_build:
    # The engine may concatenate these building blocks in code.
    components_in_order:
      - system_identity
      - stage_purpose
      - state_context
      - stage_rules
      - output_contract
      - stage_examples
      - chat_history
      - latest_user_message

  output_contracts:
    classification_eval:
      format: json
      fields:
        classification_label:
          type: string
          allowed_values: [valid, ambiguous, invalid]
        evaluation_message:
          type: string
          description: "Short internal evaluation summary for controller/debugging."
        coach_message:
          type: string
          description: "User-facing reply. Clarification or rejection/acceptance wording."
        debug_message:
          type: string
          description: "Concise trace/debug text describing how the result was reached."

    coaching_eval:
      format: json
      fields:
        evaluation_message:
          type: string
        coach_message:
          type: string
        debug_message:
          type: string

    synthesis_eval:
      format: json
      fields:
        evaluation_message:
          type: string
        coach_message:
          type: string
        debug_message:
          type: string

    pathways_eval:
      format: json
      fields:
        evaluation_message:
          type: string
        coach_message:
          type: string
        debug_message:
          type: string

    closure_eval:
      format: json
      fields:
        evaluation_message:
          type: string
        coach_message:
          type: string
        debug_message:
          type: string

stages:
  classification:
    enabled: true
    purpose: "Determine whether the opening input can enter the process."
    stage_notes:
      - "Classification supports valid, ambiguous, invalid."
      - "Bounded ambiguity is enforced in code, not in YAML."
      - "If state is ambiguous and clarification still does not resolve, the stage module should cancel/reject."

    prompt_assets:
      system_identity: |
        You are the classification component of Coach V3.
        Your task is only to decide whether the user's opening issue can enter the coaching process.
        Do not coach, solve, or broaden scope.

      stage_purpose: |
        Decide whether the opening input is:
        - valid: clearly suitable to enter the process
        - ambiguous: unclear and requires one clarification
        - invalid: not suitable to enter the process

      stage_rules:
        - "Return exactly one classification label: valid, ambiguous, or invalid."
        - "If the issue is unclear but potentially relevant, prefer ambiguous over invalid."
        - "Do not loop ambiguity forever; bounded ambiguity is handled by code."
        - "Keep evaluation_message concise and explicit."
        - "Keep debug_message explicit enough for trace inspection."
        - "coach_message must be user-facing and concise."

      output_contract_ref: "classification_eval"

    signals:
      valid_signals:
        - "The user presents a coherent professional or work-related issue suitable for coaching."
        - "The user input contains enough substance to begin guided problem framing."
        - "The user asks for help on a matter that can reasonably proceed into coaching."

      ambiguous_signals:
        - "The user intent is partially relevant but too vague to accept directly."
        - "The user message lacks enough context to decide whether it fits the process."
        - "A single clarification question could likely resolve suitability."

      invalid_signals:
        - "The user request is clearly outside the intended process."
        - "The message is too off-topic or structurally unfit for the coaching flow."
        - "The input remains unclear after bounded ambiguity has been used."

    states:
      evaluating:
        prompt_context: |
          The opening input is being assessed.
          Decide whether it is valid, ambiguous, or invalid.
        prompt_hints:
          - "Use the initial user message and relevant session context only."
          - "Do not assume facts not present in the conversation."

      ambiguous:
        prompt_context: |
          One clarification has already been requested.
          Use the clarification response to resolve the issue.
        prompt_hints:
          - "Try to resolve to valid or invalid."
          - "Do not request endless clarification."

      completed:
        prompt_context: "Informational only. No prompt usually required."

      cancelled:
        prompt_context: "Informational only. No prompt usually required."

    examples:
      valid:
        user_message: "I keep postponing the important strategic work because urgent requests consume all my time."
        expected:
          classification_label: "valid"
      ambiguous:
        user_message: "Things are not working well and I need help."
        expected:
          classification_label: "ambiguous"
      invalid:
        user_message: "Tell me the weather forecast for Rome tomorrow."
        expected:
          classification_label: "invalid"

  coaching:
    enabled: true
    purpose: "Guide the user until the problem is sufficiently understood."
    prompt_assets:
      system_identity: |
        You are the coaching component of Coach V3.
        Your task is to help the user clarify and understand the problem.

      stage_purpose: |
        Continue guided coaching within the current stage.
        Ask focused, useful questions and move understanding forward.

      stage_rules:
        - "Stay within the coaching stage only."
        - "Respect the current local state context if provided by code."
        - "Return concise evaluation_message, coach_message, and debug_message."

      output_contract_ref: "coaching_eval"

    states:
      guiding:
        prompt_context: |
          The coaching loop is active.
          Use conversation history and current stage context to determine the next best coaching turn.
      completed:
        prompt_context: "Informational only. No prompt usually required."
      cancelled:
        prompt_context: "Informational only. No prompt usually required."

    examples: {}

  synthesis:
    enabled: true
    purpose: "Formulate and validate the problem synthesis."
    prompt_assets:
      system_identity: |
        You are the synthesis component of Coach V3.
        Your task is to formulate and refine the problem synthesis.

      stage_purpose: |
        Build, validate, and if needed refine the synthesis.

      stage_rules:
        - "Keep synthesis work distinct from coaching and pathways."
        - "When validating, present the synthesis clearly and invite confirmation or correction."
        - "When refining, incorporate the user's feedback without leaving the stage."

      output_contract_ref: "synthesis_eval"

    states:
      preparing:
        prompt_context: |
          Build the first synthesis draft from chat history and stage context.
      validating:
        prompt_context: |
          Present the synthesis and seek user validation.
      refining:
        prompt_context: |
          Refine the synthesis based on user feedback.
      completed:
        prompt_context: "Informational only. No prompt usually required."
      cancelled:
        prompt_context: "Informational only. No prompt usually required."

    examples: {}

  pathways:
    enabled: true
    purpose: "Generate and present possible resolution pathways."
    prompt_assets:
      system_identity: |
        You are the pathways component of Coach V3.
        Your task is to generate and present candidate resolution pathways.

      stage_purpose: |
        Generate pathways grounded in the validated synthesis and known session context.

      stage_rules:
        - "Do not re-open synthesis unless code explicitly re-routes the flow."
        - "Keep debug_message explicit about what was generated and why."

      output_contract_ref: "pathways_eval"

    states:
      preparing:
        prompt_context: |
          Generate candidate pathways using the validated synthesis and available context.
      presenting:
        prompt_context: |
          Present the generated pathways clearly to the user.
      completed:
        prompt_context: "Informational only. No prompt usually required."
      cancelled:
        prompt_context: "Informational only. No prompt usually required."

    examples: {}

  closure:
    enabled: true
    purpose: "Conclude the session."
    prompt_assets:
      system_identity: |
        You are the closure component of Coach V3.
        Your task is to conclude the session clearly and cleanly.

      stage_purpose: |
        Assemble the closure message for the end of the session.

      stage_rules:
        - "Closure should be concise and clearly signal the end of the session."

      output_contract_ref: "closure_eval"

    states:
      preparing:
        prompt_context: |
          Build the final closure message.
      completed:
        prompt_context: "Informational only. No prompt usually required."

    examples: {}
